---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kopiur.home-operations.com/clusterrepository_v1alpha1.json
apiVersion: kopiur.home-operations.com/v1alpha1
kind: ClusterRepository
metadata:
  name: nas
spec:
  allowedNamespaces:
    all: true
  backend:
    filesystem:
      path: /repo
      volume:
        nfs:
          server: aionios.internal
          path: /mnt/bionis/Kopiur
  credentialProjection:
    allowed: true
  encryption:
    passwordSecretRef:
      name: kopiur-nas-secret
      namespace: kopiur-system
      key: KOPIA_PASSWORD
  moverDefaults:
    cache:
      capacity: 5Gi # was 1Mi (openebs ignored size); real CSI enforces it
      mode: Ephemeral # keep interim; Stage 4 → Persistent + storageClassName: miroir-replicated
      storageClassName: ceph-block
    podSecurityContext:
      fsGroup: 1001
      fsGroupChangePolicy: OnRootMismatch
    scratch:
      capacity: 5Gi # was 1Mi (openebs ignored size)
      storageClassName: ceph-block
    securityContext:
      runAsUser: 1001
      runAsGroup: 1001
    ttlSecondsAfterFinished: 300
  scheduleDefaults:
    timezone: Europe/London
