---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cloudflared
spec:
  dependsOn:
  - name: external-secrets
    namespace: security
  interval: 1h
  path: ./kubernetes/apps/network/cloudflared/app
  postBuild:
    substituteFrom:
    - kind: Secret
      name: cluster-secrets
    - kind: Secret
      name: cloudflare-tunnel-id-secret
  prune: true
  retryInterval: 2m
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
  targetNamespace: network
