---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
# Scalars consumed by Flux postBuild substitution into the mihomo config (config.yaml).
# Reuses the existing 1Password "squid" item; add a new field SS_PSK (base64 32-byte
# shadowsocks-2022 pre-shared key) to that item — see ../README.md before deploying.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mihomo
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: mihomo-secret
    template:
      engineVersion: v2
      data:
        VPS_IP: "{{ .VPS_IP }}"
        SS_PSK: "{{ .SS_PSK }}"
  dataFrom:
    - extract:
        key: squid
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
# Renders the SECRET domain list into a mihomo rule-provider file. The plaintext list
# never touches git: it is built here from the 1Password "squid" item's DOMAINS field
# (the same whitespace-separated list squid uses). Each entry becomes '+.<domain>' so the
# domain and all of its subdomains are routed through the VPS.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mihomo-sites
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: mihomo-secret-sites
    template:
      engineVersion: v2
      data:
        secret-sites.yaml: |
          payload:
          {{- range regexSplit "\\s+" (.DOMAINS | trim) -1 }}
            - '+.{{ . | trimAll "." }}'
          {{- end }}
  dataFrom:
    - extract:
        key: squid
