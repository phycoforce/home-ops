# mihomo (Clash.Meta) — LAN forward proxy with prefer-VPS / auto-fallback-to-DIRECT routing.
#
# Behaviour: domains in the (secret) rule-provider `secret-sites` egress through the VPS
# exit node while it is healthy, and AUTOMATICALLY fall back to local DIRECT egress the
# moment the VPS health-check fails (reverting on recovery). Everything else goes DIRECT.
#
# The secret domain list lives ONLY in secret-sites.yaml, which is rendered from 1Password
# by an ExternalSecret and mounted at /config/secret-sites.yaml — it is never committed.
# ${VPS_IP} and ${SS_PSK} are injected by Flux postBuild substitution (Secret: mihomo-secret).
mixed-port: 3128
allow-lan: true
bind-address: "*"
mode: rule
log-level: info
ipv6: false
# Local-only control API for observing the fallback state, e.g.:
#   kubectl -n network exec deploy/mihomo -- wget -qO- http://127.0.0.1:9090/proxies/SECRET
external-controller: 127.0.0.1:9090
# Pure domain rules — no geoip/geosite databases required, so no outbound download on start.
geo-auto-update: false

proxies:
  - name: vps
    type: ss
    server: "${VPS_IP}"
    port: 8443
    cipher: 2022-blake3-aes-256-gcm
    password: "${SS_PSK}"
    udp: true

proxy-groups:
  # `fallback` is ORDERED: it routes through the first member whose health-check passes.
  # vps while healthy -> DIRECT automatically when the VPS is down -> back to vps on recovery.
  - name: SECRET
    type: fallback
    proxies:
      - vps
      - DIRECT
    url: "http://www.gstatic.com/generate_204"
    interval: 30
    timeout: 5000
    max-failed-times: 3
    lazy: false

rule-providers:
  secret-sites:
    type: file
    behavior: domain
    format: yaml
    path: ./secret-sites.yaml

rules:
  - RULE-SET,secret-sites,SECRET
  - MATCH,DIRECT
