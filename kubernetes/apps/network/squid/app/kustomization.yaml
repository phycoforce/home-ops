# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./ocirepository.yaml
  - ./helmrelease.yaml
  - ./pvc.yaml
configMapGenerator:
  - name: squid-configmap
    files:
      - squid.conf=./resources/squid.conf
generatorOptions:
  disableNameSuffixHash: true
