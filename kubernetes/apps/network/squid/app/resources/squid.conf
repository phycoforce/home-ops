# ---------- Core safety ACLs ----------
acl SSL_ports port 443
acl Safe_ports port 80          # http
acl Safe_ports port 443         # https
acl Safe_ports port 21          # ftp
acl Safe_ports port 70          # gopher
acl Safe_ports port 210         # wais
acl Safe_ports port 280         # http-mgmt
acl Safe_ports port 488         # gss-http
acl Safe_ports port 591         # filemaker
acl Safe_ports port 777         # multiling http
acl Safe_ports port 1025-65535  # unpriv ports
acl CONNECT method CONNECT

# Allow localhost mgmt
http_access allow localhost
http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports

# ---------- Domains that should go upstream ----------
# Put one domain per line in /etc/squid/upstream_domains.lst
# e.g.:
# .example.com
# .foo.bar
acl to_upstream dstdomain ${DOMAINS}

# ---------- Parent (upstream) proxy ----------
# Replace UPSTREAM_HOST, 3128, and the credentials accordingly.
# Notes:
# - 'default' makes this the default parent route when allowed for a request.
# - 'login=user:pass' sends Basic auth to the parent.
# - 'connect-fail-limit' + 'dead_peer_timeout' let Squid mark the peer down and
#   retry it later automatically. While it's down, we'll go DIRECT if allowed.
cache_peer UPSTREAM_HOST parent 3128 0 no-query default \
    login=squidproxy:${VPS_PASSWORD} \
    connect-fail-limit=3 \
    connect-timeout=5 seconds \
    dead_peer_timeout=30 seconds

# Only send the selected domains to that parent
cache_peer_access UPSTREAM_HOST allow to_upstream
cache_peer_access UPSTREAM_HOST deny all

# ---------- Hierarchy selection & failover logic ----------
# Default is 'prefer_direct off', meaning Squid prefers peers when available.
# That’s exactly what we want: use the parent for to_upstream domains when it’s up.
# IMPORTANT: Do NOT set 'never_direct allow to_upstream' — that would block
# fallback when the parent is down. Leaving 'never_direct' unset allows DIRECT failover.
prefer_direct off

# You can keep DIRECT for everything else (not in to_upstream) as normal.
# No extra directives needed.

# ---------- Access policy for clients ----------
# Adjust to your environment (CIDRs, auth, etc.). Example allows your cluster/pod nets.
acl localnet src 10.0.0.0/8
acl localnet src 172.16.0.0/12
acl localnet src 192.168.0.0/16
http_access allow localnet
http_access allow localhost
http_access deny all

# ---------- DNS & performance niceties (optional but handy in containers) ----------
# If you want to override DNS, uncomment and set your resolver(s):
# dns_nameservers 10.96.0.10 8.8.8.8

# Make logs easier to read in containers
buffered_logs off
logfile_rotate 3

# Keep it modest for a sidecar-ish cache
cache_mem 256 MB
maximum_object_size_in_memory 512 KB
cache_dir aufs /var/spool/squid 2048 16 256
access_log stdio:/var/log/squid/access.log
cache_log stdio:/var/log/squid/cache.log
