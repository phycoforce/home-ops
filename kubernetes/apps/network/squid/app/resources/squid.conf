# ---------- Listen as a forward proxy ----------
http_port 3128
# If your pod runs as non-root and you want IPv6 too, you can also do:
# http_port [::]:3128 ipv6only=off

# ---------- Core safety ACLs ----------
acl SSL_ports port 443
acl Safe_ports port 80          # http
acl Safe_ports port 443         # https
acl Safe_ports port 21          # ftp
acl Safe_ports port 70          # gopher
acl Safe_ports port 210         # wais
acl Safe_ports port 280         # http-mgmt
acl Safe_ports port 488         # gss-http
acl Safe_ports port 591         # filemaker
acl Safe_ports port 777         # multiling http
acl Safe_ports port 1025-65535  # unpriv ports
acl CONNECT method CONNECT

http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports

# ---------- Domains that should go upstream ----------
# Use a file (recommended). One domain per line, leading dot to include subdomains.
# Example file /etc/squid/upstream_domains.lst:
#   .example.com
#   .foo.bar
acl to_upstream dstdomain "/etc/squid/upstream_domains.lst"

# ---------- Parent (upstream) proxy ----------
# Replace UPSTREAM_HOST, 3128, and the credentials accordingly.
# Use a peer name so cache_peer_access lines are unambiguous.
cache_peer UPSTREAM_HOST parent 3128 0 name=up1 no-query default \
    login=squidproxy:YOUR_PARENT_PASSWORD \
    connect-fail-limit=3 \
    connect-timeout=5 seconds \
    dead_peer_timeout=30 seconds

# Only send selected domains to that parent
cache_peer_access up1 allow to_upstream
cache_peer_access up1 deny all

# ---------- Hierarchy selection & failover logic ----------
# Prefer the parent when it's healthy; fail open (DIRECT) when it's not.
prefer_direct off
# DO NOT add 'never_direct allow to_upstream' — that would block failover to DIRECT.

# ---------- Access policy for clients ----------
# Adjust networks to your environment (cluster/pod/VPC CIDRs).
acl localnet src 10.0.0.0/8
acl localnet src 172.16.0.0/12
acl localnet src 192.168.0.0/16
http_access allow localhost
http_access allow localnet
http_access deny all

# ---------- DNS & container-friendly logging ----------
# Optionally pin DNS if cluster DNS is quirky:
# dns_nameservers 10.96.0.10 8.8.8.8
buffered_logs off
logfile_rotate 3
access_log stdio:/var/log/squid/access.log
cache_log  stdio:/var/log/squid/cache.log

# ---------- Cache sizing (modest defaults) ----------
cache_mem 256 MB
maximum_object_size_in_memory 512 KB
cache_dir aufs /var/spool/squid 2048 16 256
