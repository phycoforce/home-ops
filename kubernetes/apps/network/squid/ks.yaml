---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: squid-secrets
spec:
  interval: 1h
  path: ./kubernetes/apps/network/squid/secrets
  postBuild:
    substitute:
      APP: squid-secrets
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
  targetNamespace: network
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: squid
spec:
  dependsOn:
  - name: squid-secrets
  interval: 1h
  path: ./kubernetes/apps/network/squid/app
  postBuild:
    substitute:
      APP: squid
    substituteFrom:
    - name: squid-secret
      kind: Secret
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
  targetNamespace: network
