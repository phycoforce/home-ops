---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: towonel-operator
spec:
  chartRef:
    kind: OCIRepository
    name: towonel-operator
  interval: 1h
  values:
    # Materialised agent pods land in the network namespace.
    agentNamespace: network
    credentials:
      existingSecret: towonel-operator-secret
      tokenKey: TOWONEL_API_KEY
    # "auto" runs the full source layer (needed so a Service's towonel.io/*
    # annotations attach their route to the tunnel's default agent). Scope is
    # still Palworld-only: the source layer only acts on objects that carry
    # towonel.io annotations, and NO Gateway/HTTPRoute in this repo does — only
    # the Palworld Service opts in.
    gatewayAPI:
      enabled: auto
    towonel:
      # Hosted hub (towonel.dev). The operator authenticates with the personal
      # API key and CREATES the tunnel + RESERVES ports against this API; DNS is
      # handled separately (external-dns / DNSEndpoint), the operator never is.
      apiURL: https://hub.towonel.dev
