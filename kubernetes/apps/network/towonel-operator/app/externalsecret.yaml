---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: towonel-operator
spec:
  refreshInterval: 12h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: towonel-operator-secret
    creationPolicy: Owner
  # 1Password item "towonel" with field "api_key" (your hub personal API key, twk_...).
  data:
    - secretKey: TOWONEL_API_KEY
      remoteRef:
        key: towonel
        property: api_key
