---
# Explicit agent for Palworld. A Service annotation alone only attaches ports to
# a tunnel's *default* agent, which the operator materialises from a Gateway
# `towonel.io/auto-routes` trigger — we intentionally don't annotate any Gateway
# (keeps the tunnel scoped to Palworld only), so we hand-author the agent here.
# It provides the agent workload (dials the edge over iroh/QUIC) AND the UDP
# route to the Palworld Service's ClusterIP.
apiVersion: towonel.io/v1alpha1
kind: TowonelAgent
metadata:
  name: palworld
spec:
  tunnelRef:
    name: towonel-main
    namespace: network
  udp:
    - name: game
      origin: palworld.games.svc.cluster.local:8211
      preferredPort: 8211 # public listen port on the edge (honored if free)
  workload:
    replicas: 1
