---
# Cluster tunnel. Palworld's Service references this via
# annotation towonel.io/tunnel-ref: network/towonel-main
apiVersion: towonel.io/v1alpha1
kind: TowonelTunnel
metadata:
  name: towonel-main
spec:
  apiKeySecretRef:
    name: towonel-operator-secret
    key: TOWONEL_API_KEY
  deletionPolicy: Retain
  # Edge region closest to your players — must match the DNSEndpoint target:
  #   EU → edge-eu.towonel.dev (54.36.18.175)
  #   CA → edge-na.towonel.dev (51.79.11.238)
  region: EU
  # A tunnel needs >=1 authorized hostname to mint its hub invite, even for
  # UDP-only routing (otherwise it stays Pending and no token secret is issued).
  # We serve no HTTPS here — this is only the invite anchor, unrelated to the
  # UDP path (players reach palworld.${SECRET_DOMAIN_2}:8211 by DNS→edge→port).
  # Uses a dedicated name (not palworld.${SECRET_DOMAIN_2}) so it can't collide
  # with an orphaned hub hostname claim.
  extraHostnames:
    - "palworld.${SECRET_DOMAIN_2}"
