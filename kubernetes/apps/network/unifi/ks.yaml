---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: unifi
spec:
  components:
  - ../../../../components/volsync
  dependsOn:
  - name: rook-ceph-cluster
    namespace: rook-ceph
  - name: certificates-import
  interval: 1h
  path: ./kubernetes/apps/network/unifi/app
  postBuild:
    substitute:
      APP: unifi
      VOLSYNC_CAPACITY: 10Gi
    substituteFrom:
    - name: cluster-secrets
      kind: Secret
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
  targetNamespace: network
