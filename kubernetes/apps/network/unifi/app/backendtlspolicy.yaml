---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/gateway.networking.k8s.io/backendtlspolicy_v1alpha3.json
apiVersion: gateway.networking.k8s.io/v1alpha3
kind: BackendTLSPolicy
metadata:
  name: unifi-backend-tls
  namespace: network
spec:
  targetRefs:
    - group: ''
      kind: Service
      name: unifi
      sectionName: https
  validation:
    wellKnownCACertificates: System
    hostname: unifi.${SECRET_DOMAIN}
