---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: home-assistant
spec:
  components:
  - ../../../../components/volsync
  dependsOn:
  - name: rook-ceph-cluster
    namespace: rook-ceph
  - name: multus-networks
    namespace: network
  interval: 1h
  path: ./kubernetes/apps/services/home-assistant/app
  postBuild:
    substitute:
      APP: home-assistant
      VOLSYNC_CAPACITY: 5Gi
    substituteFrom:
    - name: cluster-secrets
      kind: Secret
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
  targetNamespace: services
