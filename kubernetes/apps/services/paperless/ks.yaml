---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: paperless
spec:
  components:
  - ../../../../components/zeroscaler
  dependsOn:
  - name: cloudnative-pg-cluster
    namespace: database
  interval: 1h
  path: ./kubernetes/apps/services/paperless/app
  postBuild:
    substituteFrom:
    - name: cluster-secrets
      kind: Secret
    substitute:
      APP: paperless
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
  targetNamespace: services
