---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: sabnzbd
spec:
  components:
  - ../../../../components/zeroscaler
  - ../../../../components/volsync
  dependsOn:
  - name: openebs
    namespace: openebs-system
  - name: rook-ceph-cluster
    namespace: rook-ceph
  interval: 1h
  path: ./kubernetes/apps/download/sabnzbd/app
  postBuild:
    substitute:
      APP: sabnzbd
      VOLSYNC_CAPACITY: 2Gi
    substituteFrom:
    - name: cluster-secrets
      kind: Secret
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
  targetNamespace: download
