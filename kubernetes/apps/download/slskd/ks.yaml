---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: slskd
spec:
  components:
  - ../../../../components/zeroscaler
  dependsOn:
  - name: rook-ceph-cluster
    namespace: rook-ceph
  interval: 1h
  path: ./kubernetes/apps/download/slskd/app
  postBuild:
    substituteFrom:
    - name: cluster-secrets
      kind: Secret
    substitute:
      APP: slskd
      CONTROLLER: StatefulSet
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
  targetNamespace: download
