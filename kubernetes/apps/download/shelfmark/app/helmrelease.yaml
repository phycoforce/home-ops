---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: shelfmark
spec:
  chartRef:
    kind: OCIRepository
    name: shelfmark
  interval: 1h
  values:
    controllers:
      shelfmark:
        annotations:
          secret.reloader.stakater.com/reload: shelfmark-secret
        pod:
          securityContext:
            fsGroup: 1001
            fsGroupChangePolicy: OnRootMismatch
            runAsGroup: 1001
            runAsNonRoot: true
            runAsUser: 1001
        containers:
          shelfmark:
            image:
              repository: ghcr.io/calibrain/shelfmark
              tag: v1.3.3@sha256:1f0e9ecdef24a3d8f5787282eaea3859edcd3bb0c3d508382e2b2bc4bb18d7d6
            env:
              FLASK_PORT: &port 80
              CUSTOM_DNS: system
              BOOK_LANGUAGE: en
              CALIBRE_WEB_URL: https://bookboss.${SECRET_DOMAIN}
              BOOKS_OUTPUT_MODE: folder
              INGEST_DIR: /books
              FILE_ORGANIZATION: rename
              FILE_ORGANIZATION_AUDIOBOOK: rename
              AUTO_OPEN_DOWNLOADS_SIDEBAR: true
              PROWLARR_ENABLED: true
              PROWLARR_URL: http://prowlarr.media.svc.cluster.local
              PROWLARR_USENET_CLIENT: sabnzbd
              SABNZBD_URL: http://sabnzbd.download.svc.cluster.local
            envFrom:
              - secretRef:
                  name: shelfmark-secret
            probes:
              liveness:
                enabled: true
                spec:
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/health
                    port: *port
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 512Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
    persistence:
      config:
        existingClaim: shelfmark
      nfs-nas-media:
        type: nfs
        server: aionios.internal
        path: /mnt/mechonis/media
        advancedMounts:
          shelfmark:
            shelfmark:
              - path: /books
                subPath: Downloads/books
      tmpfs:
        type: emptyDir
        sizeLimit: 1Gi
        globalMounts:
          - path: /tmp
            subPath: tmp
          - path: /var/log
            subPath: var-log
    route:
      app:
        hostnames:
          - shelfmark.${SECRET_DOMAIN}
        parentRefs:
          - name: envoy-internal
            namespace: network
    service:
      app:
        ports:
          http:
            port: *port
