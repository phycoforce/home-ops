---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: llmkube
spec:
  chartRef:
    kind: OCIRepository
    name: llmkube
  interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    namespace: llm
    crds:
      install: true
      keep: true
    controllerManager:
      replicaCount: 1
      leaderElection:
        enabled: false
      resources:
        requests:
          cpu: 10m
          memory: 128Mi
        limits:
          memory: 512Mi
      podSecurityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        readOnlyRootFilesystem: true
    metrics:
      enabled: false
    modelCache:
      enabled: true
      mode: perService
      size: 20Gi
      storageClass: ceph-block
      accessMode: ReadWriteOnce
      mountPath: /models
      annotations: {}
    prometheus:
      serviceMonitor:
        enabled: false
      inferencePodMonitor:
        enabled: true
        interval: 30s
      prometheusRule:
        enabled: false
