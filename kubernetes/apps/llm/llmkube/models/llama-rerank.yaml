---
apiVersion: inference.llmkube.dev/v1alpha1
kind: Model
metadata:
  name: llama-rerank
spec:
  source: https://huggingface.co/ggml-org/Qwen3-Reranker-0.6B-Q8_0-GGUF/resolve/main/qwen3-reranker-0.6b-q8_0.gguf
  format: gguf
  quantization: Q8_0
  hardware:
    accelerator: vulkan
    gpu:
      enabled: true
      vendor: intel
      layers: -1
      resourceClaims:
        - name: gpu
          resourceClaimTemplateName: llmkube-llama-gpu
  resources:
    cpu: "250m"
    memory: 2Gi
---
apiVersion: inference.llmkube.dev/v1alpha1
kind: InferenceService
metadata:
  name: llama-rerank
  labels:
    krr/ignore: "true"
spec:
  modelRef: llama-rerank
  replicas: 1
  image: ghcr.io/ggml-org/llama.cpp:server-vulkan-b9787@sha256:7d4c089963bfc351a2b89e2e35f2a12e4f1f2ff5ab5af2a9a166c825a918e286
  podLabels:
    igpu-workload: "true"
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          igpu-workload: "true"
  contextSize: 16384
  parallelSlots: 2
  batchSize: 4096
  uBatchSize: 4096
  extraArgs:
    - --alias
    - qwen3-reranker
    - --rerank
    - --pooling
    - rank
    - --cont-batching
    - --threads
    - "6"
    - --threads-batch
    - "12"
    - --mmap
  env:
    - name: ZES_ENABLE_SYSMAN
      value: "1"
    - name: ONEAPI_DEVICE_SELECTOR
      value: level_zero:gpu
    - name: UR_L0_ENABLE_RELAXED_ALLOCATION_LIMITS
      value: "1"
    - name: LD_LIBRARY_PATH
      value: /app
  resources:
    cpu: 250m
    memory: 2Gi
  securityContext:
    privileged: true
  endpoint:
    port: 8080
    type: ClusterIP
