---
apiVersion: inference.llmkube.dev/v1alpha1
kind: Model
metadata:
  name: llama-rerank
spec:
  source: https://huggingface.co/ggml-org/Qwen3-Reranker-0.6B-Q8_0-GGUF/resolve/main/qwen3-reranker-0.6b-q8_0.gguf
  format: gguf
  quantization: Q8_0
  hardware:
    accelerator: vulkan
    gpu:
      enabled: true
      vendor: intel
      layers: -1
      resourceClaims:
        - name: gpu
          resourceClaimTemplateName: llmkube-llama-gpu
  resources:
    cpu: "250m"
    memory: 2Gi
---
apiVersion: inference.llmkube.dev/v1alpha1
kind: InferenceService
metadata:
  name: llama-rerank
  labels:
    krr/ignore: "true"
spec:
  modelRef: llama-rerank
  replicas: 1
  image: ghcr.io/ggml-org/llama.cpp:server-vulkan-b9879@sha256:6640b5baeb363f801fa38e6900677b175251202ea663a898f6f9faf5d7a42eaa
  podLabels:
    igpu-workload: "true"
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          igpu-workload: "true"
  contextSize: 16384
  parallelSlots: 2
  batchSize: 4096
  uBatchSize: 4096
  extraArgs:
    - --alias
    - qwen3-reranker
    - --rerank
    - --pooling
    - rank
    - --cont-batching
    - --threads
    - "6"
    - --threads-batch
    - "12"
    - --mmap
  env:
    - name: ZES_ENABLE_SYSMAN
      value: "1"
    - name: ONEAPI_DEVICE_SELECTOR
      value: level_zero:gpu
    - name: UR_L0_ENABLE_RELAXED_ALLOCATION_LIMITS
      value: "1"
    - name: LD_LIBRARY_PATH
      value: /app
  resources:
    cpu: 250m
    memory: 2Gi
  podSecurityContext:
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 102
    supplementalGroups:
      - 44
      - 102
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    runAsUser: 1000
    capabilities:
      drop:
        - ALL
    seccompProfile:
      type: RuntimeDefault
  endpoint:
    port: 8080
    type: ClusterIP
