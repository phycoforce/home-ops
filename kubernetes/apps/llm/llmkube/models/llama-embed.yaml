---
apiVersion: inference.llmkube.dev/v1alpha1
kind: Model
metadata:
  name: llama-embed
spec:
  source: https://huggingface.co/Qwen/Qwen3-Embedding-0.6B-GGUF/resolve/main/Qwen3-Embedding-0.6B-Q8_0.gguf
  format: gguf
  quantization: Q8_0
  hardware:
    accelerator: vulkan
    gpu:
      enabled: true
      vendor: intel
      layers: -1
      resourceClaims:
        - name: gpu
          resourceClaimTemplateName: llmkube-llama-gpu
  resources:
    cpu: "250m"
    memory: 2Gi
---
apiVersion: inference.llmkube.dev/v1alpha1
kind: InferenceService
metadata:
  name: llama-embed
  labels:
    krr/ignore: "true"
spec:
  modelRef: llama-embed
  replicas: 1
  image: ghcr.io/ggml-org/llama.cpp:server-vulkan-b10068@sha256:b4d05052d06a32371b053a6449d7aa63ce826ca08440df8997d0c02dd5c0b74f
  podLabels:
    igpu-workload: "true"
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          igpu-workload: "true"
  contextSize: 32768
  parallelSlots: 2
  batchSize: 16384
  uBatchSize: 16384
  extraArgs:
    - --alias
    - llama-embed
    - --embeddings
    - --pooling
    - last
    - --cont-batching
    - --threads
    - "6"
    - --threads-batch
    - "12"
    - --mmap
  env:
    - name: ZES_ENABLE_SYSMAN
      value: "1"
    - name: ONEAPI_DEVICE_SELECTOR
      value: level_zero:gpu
    - name: UR_L0_ENABLE_RELAXED_ALLOCATION_LIMITS
      value: "1"
    - name: LD_LIBRARY_PATH
      value: /app
  resources:
    cpu: 250m
    memory: 2Gi
  podSecurityContext:
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 102
    supplementalGroups:
      - 44
      - 102
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    runAsUser: 1000
    capabilities:
      drop:
        - ALL
    seccompProfile:
      type: RuntimeDefault
  endpoint:
    port: 8080
    type: ClusterIP
