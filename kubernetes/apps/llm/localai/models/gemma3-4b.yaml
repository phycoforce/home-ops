---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/v1/configmap.json
apiVersion: v1
kind: ConfigMap
metadata:
  name: localai-model-gemma3-4b
data:
  gemma3_4b.yaml: |
    name: gemma3_4b
    backend: llama-cpp
    parameters:
      model: gemma-3-4b-it-Q4_K_M.gguf
    context_size: 8192
    threads: 6
    mmap: false
    gpu_layers: 999
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/batch/v1/job.json
apiVersion: batch/v1
kind: Job
metadata:
  name: localai-model-sync-gemma3-4b
spec:
  ttlSecondsAfterFinished: 86400
  backoffLimit: 2
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: sync
          image: ghcr.io/home-operations/busybox:1.37.0@sha256:026ed7273270ec08f6902b4ae8334c23b473e5394bec3bbbdbfe580c710d50bc
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              set -eu

              model_file="gemma-3-4b-it-Q4_K_M.gguf"
              model_url="https://huggingface.co/lmstudio-community/gemma-3-4b-it-GGUF/resolve/main/gemma-3-4b-it-Q4_K_M.gguf"
              model_sha256="be49949e48422e4547b00af14179a193d3777eea7fbbd7d6e1b0861304628a01"
              config_file="gemma3_4b.yaml"

              target="/models/${model_file}"
              tmp="${target}.part"

              download_with_retry() {
                url="$1"
                output="$2"
                retries=3
                attempt=1

                while [ "${attempt}" -le "${retries}" ]; do
                  if [ -n "${HF_TOKEN:-}" ]; then
                    if wget -O "${output}" --header="Authorization: Bearer ${HF_TOKEN}" "${url}"; then
                      return 0
                    fi
                  else
                    if wget -O "${output}" "${url}"; then
                      return 0
                    fi
                  fi

                  if [ "${attempt}" -lt "${retries}" ]; then
                    sleep 2
                  fi
                  attempt=$((attempt + 1))
                done

                return 1
              }

              if [ "${model_sha256}" != "REPLACE_WITH_SHA256" ] && [ -f "${target}" ]; then
                existing="$(sha256sum "${target}" | cut -d ' ' -f 1)"
                if [ "${existing}" = "${model_sha256}" ]; then
                  cp "/config/${config_file}" "/models/${config_file}"
                  exit 0
                fi
              fi

              download_with_retry "${model_url}" "${tmp}"

              if [ "${model_sha256}" != "REPLACE_WITH_SHA256" ]; then
                actual="$(sha256sum "${tmp}" | cut -d ' ' -f 1)"
                [ "${actual}" = "${model_sha256}" ]
              fi

              mv "${tmp}" "${target}"
              cp "/config/${config_file}" "/models/${config_file}"
          envFrom:
            - secretRef:
                name: localai-secret
          volumeMounts:
            - name: config
              mountPath: /config
            - name: models
              mountPath: /models
      volumes:
        - name: config
          configMap:
            name: localai-model-gemma3-4b
        - name: models
          persistentVolumeClaim:
            claimName: localai
