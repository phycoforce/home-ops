---
apiVersion: v1
kind: ConfigMap
metadata:
  name: localai-model-llava-llama3
data:
  llava_llama3.yaml: |
    name: llava_llama3
    backend: llama-cpp
    parameters:
      model: llava-llama-3-8b-v1_1-Q4_K_M.gguf
      mmproj: mmproj-llava-llama-3-8b-v1_1-f16.gguf
    context_size: 4096
    threads: 6
    mmap: false
    gpu_layers: 999
---
apiVersion: batch/v1
kind: Job
metadata:
  name: localai-model-sync-llava-llama3
spec:
  ttlSecondsAfterFinished: 86400
  backoffLimit: 2
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: sync
          image: cgr.dev/chainguard/curl:latest
          command:
            - /bin/sh
            - -c
            - |
              set -eu

              model_file="llava-llama-3-8b-v1_1-Q4_K_M.gguf"
              model_url="https://huggingface.co/bartowski/llava-llama-3-8b-v1_1-GGUF/resolve/main/llava-llama-3-8b-v1_1-Q4_K_M.gguf"
              model_sha256="REPLACE_WITH_SHA256"

              mmproj_file="mmproj-llava-llama-3-8b-v1_1-f16.gguf"
              mmproj_url="https://huggingface.co/bartowski/llava-llama-3-8b-v1_1-GGUF/resolve/main/mmproj-llava-llama-3-8b-v1_1-f16.gguf"
              mmproj_sha256="REPLACE_WITH_SHA256"

              config_file="llava_llama3.yaml"

              download_if_needed() {
                file="$1"
                url="$2"
                expected_sha="$3"
                target="/models/${file}"
                tmp="${target}.part"

                if [ "${expected_sha}" != "REPLACE_WITH_SHA256" ] && [ -f "${target}" ]; then
                  existing="$(sha256sum "${target}" | cut -d ' ' -f 1)"
                  if [ "${existing}" = "${expected_sha}" ]; then
                    return 0
                  fi
                fi

                if [ -n "${HF_TOKEN:-}" ]; then
                  curl -fL --retry 3 --retry-all-errors -H "Authorization: Bearer ${HF_TOKEN}" -o "${tmp}" "${url}"
                else
                  curl -fL --retry 3 --retry-all-errors -o "${tmp}" "${url}"
                fi

                if [ "${expected_sha}" != "REPLACE_WITH_SHA256" ]; then
                  actual="$(sha256sum "${tmp}" | cut -d ' ' -f 1)"
                  [ "${actual}" = "${expected_sha}" ]
                fi

                mv "${tmp}" "${target}"
              }

              download_if_needed "${model_file}" "${model_url}" "${model_sha256}"
              download_if_needed "${mmproj_file}" "${mmproj_url}" "${mmproj_sha256}"
              cp "/config/${config_file}" "/models/${config_file}"
          env:
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: localai-secret
                  key: HF_TOKEN
          volumeMounts:
            - name: config
              mountPath: /config
            - name: models
              mountPath: /models
      volumes:
        - name: config
          configMap:
            name: localai-model-llava-llama3
        - name: models
          persistentVolumeClaim:
            claimName: localai
