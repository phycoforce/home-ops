---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: localai
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 1h
  values:
    controllers:
      localai:
        replicas: 1
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: quay.io/go-skynet/local-ai
              tag: v1.40.0-gpu-intel
            env:
              TZ: Europe/London
              DEBUG: "true"
              LOCALAI_FORCE_META_BACKEND_CAPABILITY: intel
              MODELS_PATH: &modelPath /models
              THREADS: "6"
            resources:
              claims:
                - name: gpu
              requests:
                cpu: 500m
                memory: 8Gi
              limits:
                memory: 24Gi
    defaultPodOptions:
      resourceClaims:
        - name: gpu
          resourceClaimTemplateName: localai-gpu
    service:
      app:
        ports:
          http:
            port: 8080
    route:
      app:
        hostnames: ["localai.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-internal
            namespace: network
    persistence:
      models:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: *modelPath
      dev:
        type: hostPath
        hostPath: /dev/dri
        globalMounts:
          - path: /dev/dri
            readOnly: true
