---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/source.toolkit.fluxcd.io/ocirepository_v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: memini
spec:
  interval: 15m
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: v0.4.14
  url: oci://registry.erwanleboucher.dev/eleboucher/charts/memini
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: memini
spec:
  chartRef:
    kind: OCIRepository
    name: memini
  interval: 15m
  values:
    fullnameOverride: memini
    controllers:
      main:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          main:
            image:
              repository: registry.erwanleboucher.dev/eleboucher/memini
              digest: sha256:256084bb589ed138db64921a391d96395b1aa24874fa2e3b9350b9fe07004942
            env:
              MEMINI_BACKEND: sqlite
              MEMINI_DEFAULT_NAMESPACE: default
              MEMINI_EMBED_BASE_URL: http://llama-embed.llm.svc.cluster.local:8080/v1
              MEMINI_EMBED_MODEL: llama-embed
              MEMINI_EMBED_DIMS: "1024"
              MEMINI_EMBED_MAX_ITEM_CHARS: "6000"
              MEMINI_EMBED_MAX_CONCURRENCY: "2"
              MEMINI_RECALL_EMBED_TIMEOUT: 5s
              MEMINI_LLM_BASE_URL: http://litellm.llm.svc.cluster.local:4000
              MEMINI_LLM_MODEL: gemma4_e4b
              MEMINI_RERANK: http://llama-rerank.llm.svc.cluster.local:8080/v1
              MEMINI_RERANK_MODEL: qwen3-reranker
              MEMINI_RERANK_MAX_CONCURRENCY: "2"
              MEMINI_RERANK_TIMEOUT: 8s
              MEMINI_SHORT_TERM_CAP: "300"
              MEMINI_WRITE_DEDUP_MIN_SCORE: "0.90"
            envFrom:
              - secretRef:
                  name: memini
            resources:
              requests:
                cpu: 25m
                memory: 128Mi
              limits:
                memory: 512Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
      fsck:
        enabled: true
        cronjob:
          schedule: "0 5 * * *"
        containers:
          fsck:
            env:
              MEMINI_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: memini
                    key: MEMINI_API_KEY
    persistence:
      data:
        existingClaim: memini
    route:
      main:
        enabled: true
        hostnames: ["memini.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: main
                port: http
      ui:
        enabled: false
    serviceMonitor:
      main:
        enabled: true
    grafanaDashboards:
      enabled: true
      folder: llm
