---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: memini
spec:
  chartRef:
    kind: OCIRepository
    name: memini
  interval: 15m
  values:
    fullnameOverride: memini
    controllers:
      main:
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          securityContext:
            fsGroup: 1001
            fsGroupChangePolicy: OnRootMismatch
            runAsGroup: 1001
            runAsNonRoot: true
            runAsUser: 1001
        containers:
          main:
            env:
              MEMINI_BACKEND: sqlite
              MEMINI_DEFAULT_NAMESPACE: default
              MEMINI_EMBED_BASE_URL: http://llama-embed.llm.svc.cluster.local:8080/v1
              MEMINI_EMBED_MODEL: llama-embed
              MEMINI_EMBED_DIMS: "1024"
              MEMINI_EMBED_MAX_CONCURRENCY: "2"
              MEMINI_EMBED_QUERY_PREFIX: "Instruct: Given a user message, retrieve relevant past memories\nQuery: "
              MEMINI_RECALL_EMBED_TIMEOUT: 5s
              MEMINI_LLM_BASE_URL: http://litellm.llm.svc.cluster.local:4000
              MEMINI_LLM_MODEL: gemma4_e4b
              MEMINI_RERANK: http://llama-rerank.llm.svc.cluster.local:8080/v1
              MEMINI_RERANK_MODEL: qwen3-reranker
              MEMINI_RERANK_MAX_CONCURRENCY: "2"
              MEMINI_RERANK_TIMEOUT: 8s
              MEMINI_SHORT_TERM_CAP: "300"
              MEMINI_DEDUP_SIMILARITY: "0.80"
              MEMINI_DEDUP_TIERS: "episodic"
              MEMINI_WRITE_DEDUP_SCORE: "0.90"
              MEMINI_WRITE_DEDUP_ACTION: coalesce
              MEMINI_LOG_FORMAT: "json"
            envFrom:
              - secretRef:
                  name: memini
            resources:
              requests:
                cpu: 25m
                memory: 128Mi
              limits:
                memory: 512Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
      fsck:
        enabled: true
        cronjob:
          schedule: "0 5 * * *"
        pod:
          securityContext:
            fsGroup: 1001
            fsGroupChangePolicy: OnRootMismatch
            runAsGroup: 1001
            runAsNonRoot: true
            runAsUser: 1001
        containers:
          fsck:
            env:
              MEMINI_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: memini
                    key: MEMINI_API_KEY
    persistence:
      data:
        existingClaim: memini
    route:
      main:
        enabled: true
        hostnames: ["memini.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - matches:
              - path: {type: PathPrefix, value: /v1}
              - path: {type: PathPrefix, value: /mcp}
            backendRefs:
              - identifier: main
                port: http
          - backendRefs:
              - identifier: main
                port: ui
      ui:
        enabled: false
    serviceMonitor:
      main:
        enabled: true
    grafanaDashboards:
      enabled: true
      folder: llm
