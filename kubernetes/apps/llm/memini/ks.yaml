---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: memini
spec:
  components:
    - ../../../../components/kopiur
  dependsOn:
    - name: external-secrets
      namespace: security
    - name: rook-ceph-cluster
      namespace: rook-ceph
    - name: litellm
    - name: llmkube-models
  interval: 1h
  path: ./kubernetes/apps/llm/memini/app
  postBuild:
    substitute:
      APP: memini
      KOPIUR_CAPACITY: 10Gi
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
  targetNamespace: llm
