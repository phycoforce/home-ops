---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: ollama
spec:
  components:
  - ../../../../components/gpu
  dependsOn:
  - name: intel-gpu-resource-driver
    namespace: kube-system
  interval: 1h
  path: ./kubernetes/apps/llm/ollama/app
  postBuild:
    substitute:
      APP: ollama
    substituteFrom:
    - name: cluster-secrets
      kind: Secret
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
  targetNamespace: llm
