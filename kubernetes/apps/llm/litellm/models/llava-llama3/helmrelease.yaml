---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: llama-llava-llama3
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 1h
  values:
    defaultPodOptions:
      resourceClaims:
        - name: gpu
          resourceClaimTemplateName: litellm-llama-gpu
    controllers:
      llama-llava-llama3:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          model-download:
            image:
              repository: python
              tag: 3.12-slim
            command:
              - /bin/sh
              - -ec
              - |
                set -euo pipefail
                if [ ! -s /models/llava-llama-3-8b-v1_1.Q4_K_M.gguf ] || [ ! -s /models/llava-llama-3-8b-v1_1-mmproj-f16.gguf ]; then
                  pip install --no-cache-dir huggingface_hub
                  hf download \
                    MoMonir/llava-llama-3-8b-v1_1-GGUF \
                    llava-llama-3-8b-v1_1.Q4_K_M.gguf \
                    --local-dir /models
                  hf download \
                    MoMonir/llava-llama-3-8b-v1_1-GGUF \
                    llava-llama-3-8b-v1_1-mmproj-f16.gguf \
                    --local-dir /models
                  echo "llava-llama3 download complete"
                else
                  echo "llava-llama3 already downloaded, skipping"
                fi
            env:
              HF_HUB_ENABLE_HF_TRANSFER: "1"
            envFrom:
              - secretRef:
                  name: litellm-secret
            resources:
              requests:
                cpu: 250m
                memory: 512Mi
              limits:
                memory: 4Gi
        containers:
          app:
            image:
              repository: ghcr.io/ggml-org/llama.cpp
              tag: server-intel
            args:
              - --host
              - 0.0.0.0
              - --port
              - "8080"
              - --alias
              - llava_llama3
              - --model
              - /models/llava-llama-3-8b-v1_1.Q4_K_M.gguf
              - --mmproj
              - /models/llava-llama-3-8b-v1_1-mmproj-f16.gguf
              - --ctx-size
              - "4096"
              - --n-gpu-layers
              - "999"
              - --threads
              - "6"
              - --batch-size
              - "1024"
              - --ubatch-size
              - "512"
              - --no-mmap
              - --metrics
            env:
              ZES_ENABLE_SYSMAN: "1"
              ONEAPI_DEVICE_SELECTOR: level_zero:gpu
              UR_L0_ENABLE_RELAXED_ALLOCATION_LIMITS: "1"
            resources:
              claims:
                - name: gpu
              requests:
                cpu: 500m
                memory: 10Gi
              limits:
                memory: 18Gi
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  failureThreshold: 6
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  initialDelaySeconds: 20
                  periodSeconds: 10
                  failureThreshold: 6
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  failureThreshold: 180
                  periodSeconds: 10
    persistence:
      models:
        existingClaim: llava-llama3
        globalMounts:
          - path: /models
      dev-dri:
        type: hostPath
        hostPath: /dev/dri
        globalMounts:
          - path: /dev/dri
            readOnly: true
    service:
      app:
        ports:
          http:
            port: 8080
