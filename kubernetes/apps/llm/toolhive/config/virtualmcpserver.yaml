---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/toolhive.stacklok.dev/virtualmcpserver_v1beta1.json
apiVersion: toolhive.stacklok.dev/v1beta1
kind: VirtualMCPServer
metadata:
  name: mcp-gateway-internal
spec:
  groupRef:
    name: mcp-tools
  config:
    aggregation:
      conflictResolution: prefix
      conflictResolutionConfig:
        prefixFormat: "{workload}_"
  incomingAuth:
    type: anonymous
    authzConfig:
      type: inline
      inline:
        policies:
          - "permit(principal, action, resource);"
  outgoingAuth:
    source: discovered
    default:
      type: discovered
  telemetryConfigRef:
    name: prometheus
    serviceName: mcp-gateway-internal
  podTemplateSpec:
    spec:
      containers:
        - name: vmcp
          ports:
            - name: http
              containerPort: 4483
          resources:
            requests:
              cpu: 25m
              memory: 256Mi
            limits:
              memory: 1Gi
