---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/monitoring.coreos.com/podmonitor_v1.json
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: mcp-gateway-internal
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: virtualmcpserver
      app.kubernetes.io/instance: mcp-gateway-internal
  namespaceSelector:
    matchNames:
      - llm
  podMetricsEndpoints:
    - port: http
      path: /metrics
      interval: 30s
