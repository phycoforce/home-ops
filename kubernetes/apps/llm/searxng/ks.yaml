---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: searxng
spec:
  dependsOn:
  - name: dragonfly-cluster
    namespace: database
  interval: 1h
  path: ./kubernetes/apps/llm/searxng/app
  postBuild:
    substituteFrom:
    - name: cluster-secrets
      kind: Secret
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
  targetNamespace: llm
