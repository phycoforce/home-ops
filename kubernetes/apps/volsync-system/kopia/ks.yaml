---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kopia
spec:
  components:
  - ../../../../components/zeroscaler
  dependsOn:
  - name: volsync
  interval: 1h
  path: ./kubernetes/apps/volsync-system/kopia/app
  postBuild:
    substitute:
      APP: kopia
    substituteFrom:
    - name: cluster-secrets
      kind: Secret
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
  targetNamespace: volsync-system
