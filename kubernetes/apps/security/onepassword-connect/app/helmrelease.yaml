---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/source.toolkit.fluxcd.io/ocirepository_v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: onepassword-connect
spec:
  interval: 15m
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 2.4.1
  url: oci://ghcr.io/1password/connect
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: onepassword-connect
spec:
  chartRef:
    kind: OCIRepository
    name: onepassword-connect
  interval: 1h
  values:
    connect:
      annotations:
        reloader.stakater.com/auto: "true"
      api:
        httpPort: 80
        imageRepository: ghcr.io/1password/connect-api
        serviceMonitor:
          enabled: true
      sync:
        imageRepository: ghcr.io/1password/connect-sync
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: onepassword-connect
            patch: |-
              - op: remove
                path: /spec/template/spec/containers/0/env/0
              - op: remove
                path: /spec/template/spec/containers/1/env/1
              - op: add
                path: /spec/template/spec/containers/0/envFrom
                value:
                  - secretRef:
                      name: onepassword-connect-credentials-secret
              - op: add
                path: /spec/template/spec/containers/1/envFrom
                value:
                  - secretRef:
                      name: onepassword-connect-credentials-secret
              - op: remove
                path: /spec/template/spec/containers/0/volumeMounts/1
              - op: remove
                path: /spec/template/spec/containers/1/volumeMounts/1
              - op: remove
                path: /spec/template/spec/volumes/1
