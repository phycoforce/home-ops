---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: palworld
spec:
  components:
    - ../../../../components/kopiur
  dependsOn:
    - name: rook-ceph-cluster
      namespace: rook-ceph
  interval: 1h
  path: ./kubernetes/apps/games/palworld/app
  postBuild:
    substitute:
      APP: palworld
      KOPIUR_CAPACITY: 10Gi
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
  targetNamespace: games
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: palworld-exporter
spec:
  # REST-API metrics exporter (own pod, never a sidecar) + Grafana dashboard.
  # Needs palworld's secret (ADMIN_PASSWORD) and the running game pod.
  # wait: false — the bundle includes a GrafanaDashboard CR, whose readiness
  # isn't Flux-health-checkable, and nothing depends on this being Ready.
  dependsOn:
    - name: palworld
  interval: 1h
  path: ./kubernetes/apps/games/palworld/exporter
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
  targetNamespace: games
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: palworld-tools
spec:
  # REST-API admin panel (ghcr.io/rnz01/palworld-server-dashboard) on
  # envoy-internal. Reaches the game via the palworld-rest ClusterIP Service
  # (defined in exporter/) and reuses palworld-secret (ADMIN_PASSWORD), so it
  # depends on the exporter KS — which in turn depends on the game. wait: false —
  # nothing depends on it being Ready and it self-recovers once the API answers.
  dependsOn:
    - name: palworld
  interval: 1h
  path: ./kubernetes/apps/games/palworld/tools
  postBuild:
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
  targetNamespace: games
