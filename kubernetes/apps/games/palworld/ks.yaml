---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: palworld
spec:
  components:
    - ../../../../components/kopiur
  dependsOn:
    - name: rook-ceph-cluster
      namespace: rook-ceph
  interval: 1h
  path: ./kubernetes/apps/games/palworld/app
  postBuild:
    substitute:
      APP: palworld
      KOPIUR_CAPACITY: 10Gi
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
  targetNamespace: games
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: palworld-exporter
spec:
  # REST-API metrics exporter (own pod, never a sidecar) + Grafana dashboard.
  # Needs palworld's secret (ADMIN_PASSWORD) and the running game pod.
  # wait: false — the bundle includes a GrafanaDashboard CR, whose readiness
  # isn't Flux-health-checkable, and nothing depends on this being Ready.
  dependsOn:
    - name: palworld
  interval: 1h
  path: ./kubernetes/apps/games/palworld/exporter
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
  targetNamespace: games
