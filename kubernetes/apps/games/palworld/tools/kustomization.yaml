---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./ocirepository.yaml
  - ./externalsecret.yaml
  - ./rbac.yaml
  - ./helmrelease.yaml
  - ./pvc.yaml
configMapGenerator:
  # Chat bridge: the relay sidecar streams the game pod log; the journalctl shim
  # (keyed as `journalctl`) cats it for the app container.
  - name: palworld-dashboard-chat-bridge
    files:
      - relay.sh=chat-bridge-relay.sh
generatorOptions:
  disableNameSuffixHash: true
  annotations:
    kustomize.toolkit.fluxcd.io/substitute: disabled
