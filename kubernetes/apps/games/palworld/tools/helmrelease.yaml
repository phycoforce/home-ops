---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: palworld-server-dashboard
spec:
  chartRef:
    kind: OCIRepository
    name: palworld-server-dashboard
  interval: 1h
  values:
    controllers:
      palworld-server-dashboard:
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/rnz01/palworld-server-dashboard
              tag: latest@sha256:6ef88d899b3c457f5575ee308ddb176e144717d1cab33bfc34c541ffd110d1e8
            env:
              NODE_ENV: production
              PORT: &port 3000
              HOSTNAME: 0.0.0.0
              # The running game pod's REST API (own ClusterIP svc, TCP 8212).
              PALWORLD_REST_URL: http://palworld-rest.games.svc.cluster.local:8212
              # Panel's own account store — persists across restarts on the PVC.
              PANEL_AUTH_FILE: /app/data/panel-auth.json
              # Rolling FPS ring written by the fps-sampler sidecar (read here).
              PALWORLD_FPS_HISTORY_FILE: /metrics/fps-history.json
              RATE_LIMIT_TRUST_PROXY: "true"
              DEMO_MODE: "0"
            envFrom:
              - secretRef:
                  name: palworld-dashboard-secret
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: *port
                  initialDelaySeconds: 10
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: true
                spec:
                  httpGet:
                    path: /
                    port: *port
                  periodSeconds: 5
                  failureThreshold: 30
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
              # readOnlyRootFilesystem intentionally NOT set: Next.js standalone
              # writes cache/temp under /app at runtime; a read-only root risks a
              # boot failure. /tmp is a writable emptyDir regardless.
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 512Mi
          # Sidecar that maintains the FPS history ring the panel graphs. Its
          # script ships with the image's source, not any registry image, so it
          # is vendored here as a ConfigMap (tools/palworld-fps-sampler.py) run
          # on a stock python image. Purely cosmetic — the panel works without
          # it (live FPS still comes straight from the REST API), and the same
          # data is already in the Grafana dashboard. Drop this container + the
          # metrics/sampler-script volumes if you consider it redundant.
          fps-sampler:
            image:
              repository: docker.io/library/python
              tag: 3.12-alpine@sha256:6d43704baacd1bfbe7c295d7f13079d5d8104ed33568873133f8fc69980419df
            command: ["python", "/sampler/palworld-fps-sampler.py"]
            env:
              PALWORLD_REST_URL: http://palworld-rest.games.svc.cluster.local:8212
              FPS_HISTORY_FILE: /metrics/fps-history.json
              FPS_SAMPLE_SECONDS: "5"
              FPS_WINDOW_MINUTES: "60"
              PYTHONDONTWRITEBYTECODE: "1"
              PALWORLD_ADMIN_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: palworld-secret
                    key: ADMIN_PASSWORD
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 5m
                memory: 32Mi
              limits:
                memory: 64Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }
    persistence:
      # Panel account store (panel-auth.json). Deliberately an emptyDir, not a
      # PVC: the login is seeded from PANEL_PASSWORD (1Password) on every boot,
      # so it is authoritative and always in sync. Trade-off: in-app account
      # changes don't persist across restarts (fine for a single-admin panel),
      # and it removes the stale-seed-file foot-gun.
      data:
        type: emptyDir
        advancedMounts:
          palworld-server-dashboard:
            app:
              - path: /app/data
      # FPS ring shared sampler (rw) -> dashboard (ro).
      metrics:
        type: emptyDir
        advancedMounts:
          palworld-server-dashboard:
            app:
              - path: /metrics
                readOnly: true
            fps-sampler:
              - path: /metrics
      # Vendored sampler script, mounted read-only into the sidecar only.
      sampler-script:
        type: configMap
        name: palworld-dashboard-fps-sampler
        advancedMounts:
          palworld-server-dashboard:
            fps-sampler:
              - path: /sampler
                readOnly: true
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
    route:
      app:
        hostnames: ["palworld-dashboard.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-internal
            namespace: network
    service:
      app:
        ports:
          http:
            port: *port
