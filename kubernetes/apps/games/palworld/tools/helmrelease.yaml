---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: palworld-server-dashboard
spec:
  chartRef:
    kind: OCIRepository
    name: palworld-server-dashboard
  interval: 1h
  values:
    controllers:
      palworld-server-dashboard:
        # Lets the chat-relay sidecar read the game pod's logs (see rbac.yaml).
        serviceAccount:
          identifier: palworld-server-dashboard
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/phycoforce/palworld-server-dashboard
              tag: dirty@sha256:68fedac31181abe5c59d5a1a0cdef5d4e2898f613f4a762280300995789eb171
            env:
              NODE_ENV: production
              PORT: &port 3000
              HOSTNAME: 0.0.0.0
              PALWORLD_REST_URL: http://palworld-rest.games.svc.cluster.local:8212
              # On emptyDir (not the /app/data PVC) so the panel login re-seeds
              # from 1Password every boot instead of pinning an old password.
              PANEL_AUTH_FILE: /app/auth/panel-auth.json
              # In-process FPS sampler (replaces the old python sidecar); reuses
              # PALWORLD_REST_URL + PALWORLD_ADMIN_PASSWORD from envFrom.
              PALWORLD_FPS_SAMPLER: "true"
              PALWORLD_FPS_HISTORY_FILE: /app/data/fps-history.json
              FPS_WINDOW_MINUTES: "120"
              RATE_LIMIT_TRUST_PROXY: "true"
              DEMO_MODE: "0"
              PALWORLD_CHAT_LOG_FILE: /gamelog/palworld.log
              PUBLIC_VIEW_ENABLED: "true"
            envFrom:
              - secretRef:
                  name: palworld-dashboard-secret
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: *port
                  initialDelaySeconds: 10
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: true
                spec:
                  httpGet:
                    path: /
                    port: *port
                  periodSeconds: 5
                  failureThreshold: 30
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 512Mi
          # Chat bridge relay: streams the game pod's stdout (the [CHAT] +
          # join/leave lines) via the k8s API into /gamelog for the journalctl
          # shim to serve to the app. Read-only k8s access (rbac.yaml).
          chat-relay:
            image:
              repository: ghcr.io/home-operations/busybox
              tag: 1.38.0@sha256:7e2c04dd50ede647bf4a7a4c8dbd629dd4971cd139b9b88fb22bfc3c7a6c13df
            command: ["/bin/sh", "/bridge/relay.sh"]
            env:
              GAMELOG_WINDOW_SECONDS: "600"
              GAMELOG_INTERVAL_SECONDS: "10"
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 5m
                memory: 16Mi
              limits:
                memory: 64Mi
    defaultPodOptions:
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }
    persistence:
      # FPS ring history written by the in-process sampler. Reuses the old
      # sampler-sidecar "metrics" PVC so the ring file (already at its root)
      # survives restarts and carries the existing history forward.
      data:
        existingClaim: palworld-dashboard-metrics
        advancedMounts:
          palworld-server-dashboard:
            app:
              - path: /app/data
      # Panel-auth store must stay ephemeral (see PANEL_AUTH_FILE).
      auth:
        type: emptyDir
        advancedMounts:
          palworld-server-dashboard:
            app:
              - path: /app/auth
      # Shared file the relay writes and the app reads (via the journalctl shim).
      gamelog:
        type: emptyDir
        advancedMounts:
          palworld-server-dashboard:
            app:
              - path: /gamelog
                readOnly: true
            chat-relay:
              - path: /gamelog
      # Chat-bridge scripts: relay.sh (sidecar) + the journalctl shim (app);
      # 0755 so the shim is executable on the app's PATH.
      bridge:
        type: configMap
        name: palworld-dashboard-chat-bridge
        defaultMode: 0755
        advancedMounts:
          palworld-server-dashboard:
            app:
              - path: /bridge
                readOnly: true
            chat-relay:
              - path: /bridge
                readOnly: true
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
    route:
      # Internal: full admin panel (behind the PANEL password) on the LAN.
      app:
        hostnames: ["palworld-dashboard.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-internal
            namespace: network
      external:
        hostnames: ["palworld-dashboard.${SECRET_DOMAIN_2}"]
        parentRefs:
          - name: envoy-external
            namespace: network
        rules:
          - matches:
              - path: # the public page itself
                  type: PathPrefix
                  value: /view
              - path: # its only data source
                  type: PathPrefix
                  value: /api/public-view
              - path: # live-map background + marker images (public/palworld-map)
                  type: PathPrefix
                  value: /palworld-map
              - path: # JS/CSS/font/image build assets
                  type: PathPrefix
                  value: /_next
            backendRefs:
              - identifier: app
                port: *port
    service:
      app:
        ports:
          http:
            port: *port
    # Created here; rbac.yaml grants it read-only pod-log access for the relay.
    serviceAccount:
      palworld-server-dashboard: {}
