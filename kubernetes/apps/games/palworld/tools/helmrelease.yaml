---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: palworld-server-dashboard
spec:
  chartRef:
    kind: OCIRepository
    name: palworld-server-dashboard
  interval: 1h
  values:
    controllers:
      palworld-server-dashboard:
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/rnz01/palworld-server-dashboard
              tag: latest@sha256:6ef88d899b3c457f5575ee308ddb176e144717d1cab33bfc34c541ffd110d1e8
            env:
              NODE_ENV: production
              PORT: &port 3000
              HOSTNAME: 0.0.0.0
              PALWORLD_REST_URL: http://palworld-rest.games.svc.cluster.local:8212
              PANEL_AUTH_FILE: /app/data/panel-auth.json
              PALWORLD_FPS_HISTORY_FILE: /metrics/fps-history.json
              RATE_LIMIT_TRUST_PROXY: "true"
              DEMO_MODE: "0"
            envFrom:
              - secretRef:
                  name: palworld-dashboard-secret
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: *port
                  initialDelaySeconds: 10
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: true
                spec:
                  httpGet:
                    path: /
                    port: *port
                  periodSeconds: 5
                  failureThreshold: 30
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 512Mi
          # FPS Monitoring Script, derived from upstream pythons script
          fps-sampler:
            image:
              repository: docker.io/library/python
              tag: 3.14-alpine@sha256:26730869004e2b9c4b9ad09cab8625e81d256d1ce97e72df5520e806b1709f92
            command: ["python", "/sampler/palworld-fps-sampler.py"]
            env:
              PALWORLD_REST_URL: http://palworld-rest.games.svc.cluster.local:8212
              FPS_HISTORY_FILE: /metrics/fps-history.json
              FPS_SAMPLE_SECONDS: "5"
              FPS_WINDOW_MINUTES: "120"
              FPS_SANE_MAX: "240"
              PYTHONDONTWRITEBYTECODE: "1"
              PALWORLD_ADMIN_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: palworld-secret
                    key: ADMIN_PASSWORD
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 5m
                memory: 32Mi
              limits:
                memory: 64Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }
    persistence:
      data:
        type: emptyDir
        advancedMounts:
          palworld-server-dashboard:
            app:
              - path: /app/data
      metrics:
        existingClaim: palworld-dashboard-metrics
        advancedMounts:
          palworld-server-dashboard:
            app:
              - path: /metrics
                readOnly: true
            fps-sampler:
              - path: /metrics
      sampler-script:
        type: configMap
        name: palworld-dashboard-fps-sampler
        advancedMounts:
          palworld-server-dashboard:
            fps-sampler:
              - path: /sampler
                readOnly: true
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
    route:
      app:
        hostnames: ["palworld-dashboard.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-internal
            namespace: network
    service:
      app:
        ports:
          http:
            port: *port
