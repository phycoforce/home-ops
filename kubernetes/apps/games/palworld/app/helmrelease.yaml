---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: palworld
spec:
  chartRef:
    kind: OCIRepository
    name: palworld
  interval: 1h
  values:
    controllers:
      palworld:
        annotations:
          reloader.stakater.com/auto: "true"
        strategy: Recreate
        containers:
          app:
            image:
              repository: ghcr.io/thijsvanloef/palworld-server-docker
              tag: v2.6.0@sha256:85ae20d8756dd398ec24f4253a59b80907e5ffe411148a67b2c80c4527a8855e
            env:
              TZ: Europe/London
              ## Container behaviour
              PUID: "1001"
              PGID: "1001"
              UPDATE_ON_BOOT: true # SteamCMD update+validate on every boot
              BACKUP_ENABLED: false # kopiur snapshots the PVC instead
              AUTO_REBOOT_ENABLED: true
              AUTO_REBOOT_CRON_EXPRESSION: "0 6 * * *" # 6am daily
              AUTO_REBOOT_EVEN_IF_PLAYERS_ONLINE: true # match prior unconditional restart
              AUTO_REBOOT_WARN_MINUTES: 5
              ENABLE_PERF_THREADING_ARGS: true
              WORKER_THREADS_SERVER: 20
              ## Server identity / access
              SERVER_NAME: Kampfler # shown in-game
              SERVER_DESCRIPTION: Palworld dedicated server
              COMMUNITY: true # listed in the in-game Community Server browser (still password-gated via SERVER_PASSWORD)
              PLAYERS: 16
              ## Public networking — external players reach the server via a home
              ## router UDP port-forward of 8211 → the LB IP; PUBLIC_IP resolves to
              ## the WAN IP (palworld DNS managed manually, grey-cloud).
              PORT: &port 8211
              PUBLIC_IP: palworld.${SECRET_DOMAIN_2}
              PUBLIC_PORT: *port
              REST_API_ENABLED: true
              REST_API_PORT: 8212
              RCON_ENABLED: false
              ## Game Settings
              BASE_CAMP_WORKER_MAX_NUM: 25 # Max Pals working at a base (default 15)
              ALLOW_GLOBAL_PALBOX_EXPORT: true # bAllowGlobalPalboxExport — save Pals to the global palbox
              ALLOW_GLOBAL_PALBOX_IMPORT: true # bAllowGlobalPalboxImport — import Pals from the global palbox (default false)
              ENABLE_NON_LOGIN_PENALTY: false
              DAYTIME_SPEEDRATE: 0.9
              EXP_RATE: 1.20
              PAL_CAPTURE_RATE: 1.5
              PAL_SPAWN_NUM_RATE: 1.2
              PAL_STOMACH_DECREASE_RATE: 0.6
              PAL_STAMINA_DECREASE_RATE: 0.2
              PAL_AUTO_HP_REGEN_RATE_IN_SLEEP: 3.2
              PLAYER_DAMAGE_RATE_DEFENSE: 0.9
              PLAYER_STOMACH_DECREASE_RATE: 0.7
              PLAYER_STAMINA_DECREASE_RATE: 0.6
              PLAYER_AUTO_HP_REGEN_RATE: 1.2
              PLAYER_AUTO_HP_REGEN_RATE_IN_SLEEP: 3.5
              WORK_SPEED_RATE: 1.3
              BUILD_OBJECT_DAMAGE_RATE: 0.8
              BUILD_OBJECT_DETERIORATION_DAMAGE_RATE: 0.2
              COLLECTION_DROP_RATE: 1.5
              COLLECTION_OBJECT_RESPAWN_SPEED_RATE: 1.1
              ENEMY_DROP_ITEM_RATE: 1.1
              ITEM_WEIGHT_RATE: 0.5
              ITEM_CORRUPTION_MULTIPLIER: 0.1
              EQUIPMENT_DURABILITY_DAMAGE_RATE: 0.4
            envFrom:
              - secretRef:
                  name: palworld-secret
            # No HTTP endpoint to probe; startup runs a SteamCMD update that can
            # take minutes. Rely on the game process + kopiur backups instead.
            probes:
              liveness: &disabled
                enabled: false
              readiness: *disabled
              startup: *disabled
            resources:
              requests:
                cpu: 1000m
                memory: 8Gi
              limits:
                memory: 20Gi
    defaultPodOptions:
      terminationGracePeriodSeconds: 120
    persistence:
      # World + config (Pal/Saved). kopiur component provisions this PVC (name
      # == ${APP} == palworld) and snapshots it hourly to the NAS repository.
      config:
        existingClaim: palworld
        globalMounts:
          - path: /palworld
      # Game binaries + content (~10-15 GB). Regenerated by SteamCMD, so it is a
      # plain ceph-block PVC that is deliberately NOT backed up.
      cache:
        existingClaim: palworld-cache
        globalMounts:
          - path: /palworld/Pal/Binaries
            subPath: binaries
          - path: /palworld/Pal/Content
            subPath: content
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
    service:
      app:
        type: LoadBalancer
        externalTrafficPolicy: Local
        annotations:
          lbipam.cilium.io/ips: 10.0.20.246
        ports:
          game:
            port: *port # 8211
            protocol: UDP
