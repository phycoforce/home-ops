---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: palworld
spec:
  chartRef:
    kind: OCIRepository
    name: palworld
  interval: 1h
  values:
    controllers:
      palworld:
        annotations:
          reloader.stakater.com/auto: "true"
        # Singleton stateful game server: one replica, never two against one world
        # (guaranteed save corruption). Recreate so the old pod releases the RWO
        # PVC before the new one starts.
        strategy: Recreate
        containers:
          app:
            image:
              repository: ghcr.io/jammsen/docker-palworld-dedicated-server
              tag: master@sha256:ee924ca970450f59c89656953367c42c07327a7cdffc66f156be285dccae93c8
            env:
              TZ: Europe/London
              ## Container behaviour
              PUID: "1001"
              PGID: "1001"
              ALWAYS_UPDATE_ON_START: true # SteamCMD update+validate on every boot
              STEAMCMD_VALIDATE_FILES: true
              BACKUP_ENABLED: false # kopiur snapshots the PVC instead
              RESTART_ENABLED: true
              RESTART_CRON_EXPRESSION: 0 6 * * * #5am daily
              MULTITHREAD_ENABLED: true
              SERVER_SETTINGS_MODE: auto
              ## Server identity / access
              SERVER_NAME: Kampfler # TODO: your server name (shown in-game)
              SERVER_DESCRIPTION: Palworld dedicated server
              COMMUNITY_SERVER: true # listed in the in-game Community Server browser (still password-gated via SERVER_PASSWORD)
              MAX_PLAYERS: 16
              ## Public networking — external players reach the server via a home
              ## router UDP port-forward of 8211 → the LB IP; PUBLIC_IP resolves to
              ## the WAN IP (palworld DNS managed manually, grey-cloud).
              PUBLIC_IP: palworld.${SECRET_DOMAIN_2}
              PUBLIC_PORT: &port 8211
              ## REST API — cluster-internal only (container tooling); NOT exposed
              RESTAPI_ENABLED: true
              RESTAPI_PORT: 8212
              ## RCON removed from image tooling upstream; leave disabled
              RCON_ENABLED: false
              ## Game Settings
              BASE_CAMP_WORKER_MAXNUM: 20 # Max Pals working at a base (default 15)
              ALLOW_GLOBAL_PALBOX_EXPORT: true # bAllowGlobalPalboxExport — save Pals to the global palbox
              ALLOW_GLOBAL_PALBOX_IMPORT: true # bAllowGlobalPalboxImport — import Pals from the global palbox (default false)
              ENABLE_NON_LOGIN_PENALTY: false
              DAYTIME_SPEEDRATE: 0.9
              EXP_RATE: 1.25
              PAL_CAPTURE_RATE: 1.5
              PAL_SPAWN_NUM_RATE: 1.2
              PAL_STOMACH_DECREACE_RATE: 0.6
              PAL_STAMINA_DECREACE_RATE: 0.2
              PAL_AUTO_HP_REGENE_RATE_IN_SLEEP: 3.2
              PLAYER_DAMAGE_RATE_DEFENSE: 0.9
              PLAYER_STOMACH_DECREASE_RATE: 0.7
              PLAYER_STAMINA_DECREACE_RATE: 0.6
              PLAYER_AUTO_HP_REGENE_RATE: 1.2
              PLAYER_AUTO_HP_REGENE_RATE_IN_SLEEP: 3.5
              WORK_SPEED_RATE: 1.3
              BUILD_OBJECT_DAMAGE_RATE: 0.8
              BUILD_OBJECT_DETERIORATION_DAMAGE_RATE: 0.2
              COLLECTION_DROP_RATE: 1.5
              COLLECTION_OBJECT_RESPAWN_SPEED_RATE: 1.1
              ENEMY_DROP_ITEM_RATE: 1.1
              ITEM_WEIGHT_RATE: 0.5
              ITEM_CORRUPTION_MULTIPLIER: 0.4
              EQUIPMENT_DURABILITY_DAMAGE_RATE: 0.4
            envFrom:
              - secretRef:
                  name: palworld-secret
            # No HTTP endpoint to probe; startup runs a SteamCMD update that can
            # take minutes. Rely on the game process + kopiur backups instead.
            probes:
              liveness: &disabled
                enabled: false
              readiness: *disabled
              startup: *disabled
            resources:
              requests:
                cpu: 1000m
                memory: 8Gi
              # RAM grows with world size; a tight limit OOM-killed mid-save can
              # corrupt the world, so keep generous headroom.
              limits:
                memory: 20Gi
    persistence:
      # World + config (Pal/Saved). kopiur component provisions this PVC (name
      # == ${APP} == palworld) and snapshots it hourly to the NAS repository.
      config:
        existingClaim: palworld
        globalMounts:
          - path: /palworld
      # Game binaries + content (~10-15 GB). Regenerated by SteamCMD, so it is a
      # plain ceph-block PVC that is deliberately NOT backed up.
      cache:
        existingClaim: palworld-cache
        globalMounts:
          - path: /palworld/Pal/Binaries
            subPath: binaries
          - path: /palworld/Pal/Content
            subPath: content
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
    service:
      app:
        type: LoadBalancer
        # LB IP 10.0.20.246 on UDP 8211 (the port the game binds). LAN plays
        # direct at 10.0.20.246:8211; external is a MikroTik UDP port-forward of
        # WAN 8211 → 10.0.20.246:8211. Local preserves the real client IP.
        externalTrafficPolicy: Local
        annotations:
          lbipam.cilium.io/ips: 10.0.20.246
        ports:
          game:
            port: *port # 8211
            protocol: UDP
