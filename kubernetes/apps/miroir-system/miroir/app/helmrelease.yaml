---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: miroir
spec:
  chartRef:
    kind: OCIRepository
    name: miroir
  interval: 1h
  values:
    # TEMPORARY: custom agent image carrying the split-brain convergence fix
    # (upstream home-operations/miroir#144, branch fix/split-brain-loser-convergence).
    # Remove once the fix lands in an upstream release.
    agent:
      image:
        repository: ghcr.io/phycoforce/miroir-agent
        tag: fix-144-r3
        digest: sha256:95e65c93dd24babf0adefee3a09e828daf8ded8945f61d77c0192250c126b600 # takes precedence over tag
    monitoring:
      dashboards:
        enabled: true
        grafanaOperator:
          enabled: true
          matchLabels:
            dashboards: grafana
      podMonitor:
        enabled: true
      prometheusRule:
        enabled: true
    # One lvm-thin pool per node on the dedicated Micron 7450 (Talos RawVolumeConfig → r-miroir)
    nodes:
      logos:
        backend: lvmthin
        device: /dev/disk/by-partlabel/r-miroir
      ontos:
        backend: lvmthin
        device: /dev/disk/by-partlabel/r-miroir
      pneuma:
        backend: lvmthin
        device: /dev/disk/by-partlabel/r-miroir
    # Both StorageClasses draw from the same per-node pool; differ only by replica count.
    storageClass: # miroir-local: single copy, no DRBD
      create: true
      name: miroir-local
      isDefault: false
      replicas: 1
      fsType: ext4
      reclaimPolicy: Delete
    replicatedStorageClass: # miroir-replicated: 2 legs, DRBD9-mirrored (+ diskless tiebreaker)
      create: true
      name: miroir-replicated
      isDefault: false
      quorum: freeze
      fsType: ext4
      reclaimPolicy: Delete
