---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: nut-exporter
spec:
  interval: 1h
  path: ./kubernetes/apps/observability/nut-exporter/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: true
  targetNamespace: observability
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: nut-exporter-dashboard
spec:
  dependsOn:
  - name: nut-exporter
  interval: 1h
  path: ./kubernetes/apps/observability/nut-exporter/dashboard
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
  targetNamespace: observability
