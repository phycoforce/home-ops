---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kromgo
spec:
  interval: 1h
  path: ./kubernetes/apps/observability/kromgo/app
  postBuild:
    substituteFrom:
    - name: cluster-secrets
      kind: Secret
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
  targetNamespace: observability
