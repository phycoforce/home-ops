---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
resources:
  - ./snapshotpolicy.yaml
  - ./snapshotschedule.yaml
  # Cutover complete: kopiur owns the ${APP} PVC via the Restore populator.
  # A bound PVC's dataSourceRef is immutable, so the old volsync-provisioned PVC
  # must be deleted so Flux re-creates it here and the populator hydrates it.
  - ./pvc.yaml
  - ./restore.yaml
